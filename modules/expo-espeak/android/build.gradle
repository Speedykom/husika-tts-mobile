plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.espeak'
version = '1.0.0'

android {
  namespace "expo.modules.espeak"
  compileSdk 35

  defaultConfig {
    minSdk 24
    targetSdk 35
    versionCode 1
    versionName '1.0.0'

    externalNativeBuild {
      cmake {
        abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
        arguments "-DANDROID_STL=c++_shared"
        targets "espeak_bridge"
      }
    }
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
      version "3.22.1"
    }
  }

  sourceSets {
    main {
      assets.srcDirs = ['assets']
    }
  }
}

dependencies {
  implementation 'com.facebook.react:react-android'
  implementation(name: 'onnxruntime-android-1.20.0', ext: 'aar')
}
